version: '3.8'

services:
  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq_server
    ports:
      - "5672:5672"   # AMQP protocol port
      - "15672:15672" # Management UI port
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq

  webhook_service:
    build: 
      context: ./node
      dockerfile: Dockerfile
    container_name: webhook_service
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      # Use the container name 'rabbitmq' instead of localhost
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672
    command: npm run start --workspace=webhook_service
    depends_on:
      - rabbitmq

  pr_service:
    build: 
      context: ./node
      dockerfile: Dockerfile
    container_name: pr_service
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - GITHUB_TOKEN=${GITHUB_TOKEN} # This will be passed from your local .env file or terminal
    command: npm run start --workspace=pr_service

  code_parsing_service:
    build:
      context: ./python
      dockerfile: Dockerfile
    container_name: code_parsing_service
    environment:
      - RABBITMQ_HOST=rabbitmq
      - PYTHONUNBUFFERED=1
    command: python code_parsing_service.py
    depends_on:
      - rabbitmq

  ai_docs_service:
    build:
      context: ./python
      dockerfile: Dockerfile
    container_name: ai_docs_service
    environment:
      - RABBITMQ_HOST=rabbitmq
      - API_ENDPOINT=http://pr_service:3001/publish
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - PYTHONUNBUFFERED=1
    command: python ai_docs_service.py
    depends_on:
      - rabbitmq

volumes:
  rabbitmq_data:

